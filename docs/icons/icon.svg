<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1B4332"/>
  <!-- Outer gold ring accent -->
  <rect x="24" y="24" width="464" height="464" rx="72" fill="none" stroke="#C9A84C" stroke-width="8" opacity="0.6"/>
  <!-- Golf flag pole -->
  <line x1="300" y1="110" x2="300" y2="310" stroke="#C9A84C" stroke-width="10" stroke-linecap="round"/>
  <!-- Golf flag -->
  <polygon points="300,110 360,140 300,170" fill="#C9A84C"/>
  <!-- "GV" monogram -->
  <text x="110" y="290"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="160"
    font-weight="bold"
    fill="#FFFFFF"
    letter-spacing="-8">G</text>
  <text x="215" y="290"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="160"
    font-weight="bold"
    fill="#C9A84C"
    letter-spacing="-8">V</text>
  <!-- Subtle green divider line -->
  <line x1="64" y1="340" x2="448" y2="340" stroke="#C9A84C" stroke-width="4" opacity="0.5"/>
  <!-- Golf ball -->
  <circle cx="128" cy="390" r="28" fill="#FFFFFF"/>
  <circle cx="118" cy="383" r="3" fill="#E0E0E0"/>
  <circle cx="130" cy="378" r="3" fill="#E0E0E0"/>
  <circle cx="142" cy="384" r="3" fill="#E0E0E0"/>
  <circle cx="122" cy="395" r="3" fill="#E0E0E0"/>
  <circle cx="135" cy="399" r="3" fill="#E0E0E0"/>
  <!-- GOLFVAULT wordmark -->
  <text x="256" y="408"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="bold"
    fill="#C9A84C"
    text-anchor="middle"
    letter-spacing="4">GOLFVAULT</text>
</svg>
