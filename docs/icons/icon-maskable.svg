<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background for maskable (safe zone: inner 80%) -->
  <rect width="512" height="512" fill="#1B4332"/>
  <!-- Content within safe zone (centered, 80% = 410x410, offset 51px each side) -->
  <!-- Golf flag pole -->
  <line x1="290" y1="130" x2="290" y2="290" stroke="#C9A84C" stroke-width="10" stroke-linecap="round"/>
  <!-- Golf flag -->
  <polygon points="290,130 345,158 290,186" fill="#C9A84C"/>
  <!-- "GV" monogram -->
  <text x="100" y="285"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="150"
    font-weight="bold"
    fill="#FFFFFF"
    letter-spacing="-6">G</text>
  <text x="205" y="285"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="150"
    font-weight="bold"
    fill="#C9A84C"
    letter-spacing="-6">V</text>
  <!-- Divider -->
  <line x1="80" y1="325" x2="432" y2="325" stroke="#C9A84C" stroke-width="3" opacity="0.5"/>
  <!-- Wordmark -->
  <text x="256" y="390"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-weight="bold"
    fill="#C9A84C"
    text-anchor="middle"
    letter-spacing="4">GOLFVAULT</text>
</svg>
